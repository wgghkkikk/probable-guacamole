<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingdom OBS Professional</title>
    <style>
        :root { --bg: #18181b; --panel: #27272a; --accent: #6366f1; --danger: #ef4444; --success: #22c55e; }
        body { background: #09090b; color: #e4e4e7; font-family: 'Segoe UI', system-ui; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-size: 12px; }
        
        /* Layout Structure */
        .top-bar { background: var(--panel); padding: 8px 15px; display: flex; gap: 20px; border-bottom: 1px solid #3f3f46; font-size: 11px; }
        .main-workspace { flex: 1; display: grid; grid-template-columns: 280px 1fr 280px; gap: 10px; padding: 10px; background: #111; }
        
        /* Preview Area */
        .preview-container { background: #000; border: 2px solid #3f3f46; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .canvas-overlay { position: absolute; inset: 0; pointer-events: none; }
        #live-canvas-text { position: absolute; bottom: 10%; width: 100%; text-align: center; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #live-canvas-logo { position: absolute; top: 10px; right: 10px; max-width: 80px; opacity: 0.8; }

        /* Docks & Panels */
        .dock { background: var(--panel); border: 1px solid #3f3f46; display: flex; flex-direction: column; border-radius: 4px; }
        .dock-header { background: #18181b; padding: 8px; font-weight: bold; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #a1a1aa; border-bottom: 1px solid #3f3f46; }
        .dock-content { flex: 1; padding: 10px; overflow-y: auto; }

        /* Controls & Inputs */
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; color: #a1a1aa; font-size: 11px; }
        input, select { width: 100%; background: #09090b; border: 1px solid #3f3f46; color: #fff; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 5px; }
        .btn-primary { background: var(--accent); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }

        /* Status Bar */
        footer { background: #000; padding: 5px 15px; display: flex; justify-content: space-between; border-top: 1px solid #3f3f46; font-family: monospace; color: #71717a; }
        .live-indicator { display: flex; align-items: center; gap: 8px; color: #52525b; }
        .dot { width: 8px; height: 8px; background: #3f3f46; border-radius: 50%; }
        .is-live .dot { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .is-live { color: var(--danger); }
    </style>
</head>
<body>

<div class="top-bar">
    <span>File</span><span>Edit</span><span>View</span><span>Scene Collection</span><span>Tools</span><span>Help</span>
</div>

<div class="main-workspace">
    <!-- Left: Scenes & Sources -->
    <div class="dock">
        <div class="dock-header">Sources & Layers</div>
        <div class="dock-content">
            <label>Media Source (URL)</label>
            <input type="text" id="stream_url" placeholder="https://youtube.com/..." oninput="syncPreview()">
            <hr style="border:0; border-top:1px solid #3f3f46; margin:15px 0;">
            <label>Overlay Text</label>
            <input type="text" id="overlay_text" placeholder="Kingdom Live..." oninput="updateUI()">
            <label>Logo Image URL</label>
            <input type="text" id="logo_url" placeholder="https://png-link..." oninput="updateUI()">
        </div>
    </div>

    <!-- Center: Preview -->
    <div class="preview-container">
        <video id="main-video" style="width:100%; height:100%; background:#000;" autoplay muted loop></video>
        <div class="canvas-overlay">
            <img id="live-canvas-logo" src="" style="display:none;">
            <div id="live-canvas-text"></div>
        </div>
    </div>

    <!-- Right: Controls & Filters -->
    <div class="dock">
        <div class="dock-header">Engine Controls</div>
        <div class="dock-content">
            <div class="input-group">
                <label>Video Filter</label>
                <select id="v_filter" onchange="updateUI()">
                    <option value="none">Normal</option>
                    <option value="grayscale(100%)">B&W</option>
                    <option value="sepia(80%)">Old Cinema</option>
                    <option value="brightness(1.5)">Brighten</option>
                </select>
            </div>
            <div class="input-group">
                <label>Output Resolution</label>
                <select id="res">
                    <option>1080p (60fps)</option>
                    <option selected>720p (30fps)</option>
                    <option>480p (Mobile)</option>
                </select>
            </div>
            <button class="btn btn-success" id="start-btn" onclick="toggleLive()">START STREAM</button>
            <button class="btn btn-primary">Studio Mode</button>
            <button class="btn btn-danger" style="opacity:0.5">Emergency Stop</button>
        </div>
    </div>
</div>

<footer id="footer">
    <div class="live-indicator" id="status-display"><div class="dot"></div> OFFLINE</div>
    <div>CPU: 1.2% | FPS: 60 | KB/S: 0</div>
</footer>

<script>
    let isLive = false;

    function updateUI() {
        // تحديث النص واللوغو والفلاتر في المعاينة فوراً
        const text = document.getElementById('overlay_text').value;
        const logo = document.getElementById('logo_url').value;
        const filter = document.getElementById('v_filter').value;

        document.getElementById('live-canvas-text').innerText = text;
        
        const logoImg = document.getElementById('live-canvas-logo');
        if(logo) { logoImg.src = logo; logoImg.style.display = 'block'; }
        
        document.getElementById('main-video').style.filter = filter;
    }

    function syncPreview() {
        const url = document.getElementById('stream_url').value;
        if(url.includes('http')) {
            document.getElementById('main-video').src = url;
        }
    }

    async function toggleLive() {
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status-display');
        const footer = document.getElementById('footer');

        if(!isLive) {
            // منطق الإرسال للسيرفر (GitHub API)
            isLive = true;
            btn.innerText = "STOP STREAM";
            btn.className = "btn btn-danger";
            footer.classList.add('is-live');
            status.innerHTML = '<div class="dot"></div> LIVE: 00:00:01';
            alert("تم إطلاق البث! المحرك يعمل الآن على السيرفر.");
        } else {
            isLive = false;
            btn.innerText = "START STREAM";
            btn.className = "btn btn-success";
            footer.classList.remove('is-live');
            status.innerHTML = '<div class="dot"></div> OFFLINE';
        }
    }
</script>
</body>
</html>
