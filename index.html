<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassan OBS Studio - Pro</title>
    <style>
        :root { --bg-dark: #1e1e1e; --panel-bg: #2d2d2d; --accent: #4a90e2; --text: #e0e0e0; --obs-orange: #f57c00; }
        body { background: #121212; color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Toolbar */
        header { background: var(--panel-bg); padding: 5px 15px; font-size: 12px; border-bottom: 1px solid #000; display: flex; gap: 15px; }
        
        /* Main Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        
        /* Preview Screen */
        .preview-window { flex: 2; background: #000; margin: 10px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; position: relative; }
        .preview-window::after { content: "LIVE PREVIEW"; color: #333; font-weight: bold; font-size: 20px; }

        /* Bottom Controls */
        .obs-dock { background: var(--panel-bg); display: grid; grid-template-columns: 1fr 1fr 1.5fr 1fr; gap: 5px; padding: 10px; border-top: 2px solid #000; height: 250px; }
        .dock-item { background: #383838; border: 1px solid #111; padding: 8px; display: flex; flex-direction: column; }
        .dock-title { font-size: 11px; font-weight: bold; color: #aaa; margin-bottom: 5px; text-align: center; background: #222; }

        /* Inputs & Buttons */
        input { background: #111; border: 1px solid #444; color: #fff; padding: 6px; font-size: 11px; margin-bottom: 5px; width: 100%; box-sizing: border-box; }
        .obs-btn { background: #444; color: white; border: 1px solid #555; padding: 8px; cursor: pointer; font-size: 12px; text-align: center; }
        .btn-start { background: #28a745; border-color: #1e7e34; margin-top: auto; font-weight: bold; }
        
        /* Console Log */
        .console { background: #000; color: #0f0; font-family: monospace; font-size: 10px; flex: 1; overflow-y: auto; padding: 5px; border: 1px solid #333; }
        
        .list-item { font-size: 11px; padding: 3px; border-bottom: 1px solid #444; }
        .active-scene { background: var(--accent); color: white; }
    </style>
</head>
<body>

<header>
    <span>File</span><span>Edit</span><span>View</span><span>Profile</span><span>Scene Collection</span><span>Tools</span><span>Help</span>
</header>

<div class="main-container">
    <!-- شاشة المعاينة الكبيرة -->
    <div class="preview-window"></div>

    <!-- لوحة التحكم السفلية (Docks) -->
    <div class="obs-dock">
        <!-- Scenes -->
        <div class="dock-item">
            <div class="dock-title">Scenes</div>
            <div class="list-item active-scene">Youtube Live Scene</div>
            <div class="list-item">Default Scene</div>
        </div>

        <!-- Sources -->
        <div class="dock-item">
            <div class="dock-title">Sources</div>
            <div class="list-item">🌐 YouTube Source</div>
            <div class="list-item">🖼️ Overlay Image</div>
            <div class="list-item">🔊 Desktop Audio</div>
        </div>

        <!-- Settings & Inputs -->
        <div class="dock-item">
            <div class="dock-title">Stream Settings</div>
            <input type="text" id="streamUrl" placeholder="Video URL (رابط الفيديو)">
            <input type="text" id="streamKey" placeholder="Stream Key (مفتاح البث)">
            <input type="password" id="ghToken" placeholder="GitHub Token (ghp_...)">
            <div class="console" id="logBox">[SYSTEM]: Ready to stream...</div>
        </div>

        <!-- Controls -->
        <div class="dock-item">
            <div class="dock-title">Controls</div>
            <button class="obs-btn btn-start" onclick="runStream()">Start Streaming</button>
            <button class="obs-btn" style="margin-top:5px">Start Recording</button>
            <button class="obs-btn" style="margin-top:5px" onclick="location.reload()">Exit / Reset</button>
        </div>
    </div>
</div>

<script>
    async function runStream() {
        const token = document.getElementById('ghToken').value;
        const url = document.getElementById('streamUrl').value;
        const key = document.getElementById('streamKey').value;
        const log = document.getElementById('logBox');

        if(!token || !url || !key) {
            alert("يا حسن، املأ كل الخانات أولاً!");
            return;
        }

        log.innerHTML = "[INFO]: Connecting to GitHub...";
        
        try {
            const res = await fetch(`https://api.github.com/repos/wgghkkikk/probable-guacamole/actions/workflows/live.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ ref: 'main', inputs: { stream_key: key, video_url: url } })
            });

            if (res.ok) {
                log.innerHTML += "<br>[SUCCESS]: البث بدأ! شيك قناتك.";
                document.querySelector('.btn-start').style.background = "#dc3545";
                document.querySelector('.btn-start').innerText = "Stop Streaming";
            } else {
                log.innerHTML += "<br>[ERROR]: فشل الاتصال. الـ Token غلط؟";
            }
        } catch (e) {
            log.innerHTML += "<br>[ERROR]: مشكلة بالشبكة.";
        }
    }
</script>

</body>
</html>
