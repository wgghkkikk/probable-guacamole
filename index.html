<script>
    let isStreaming = false;
    
    // معلومات المستودع الخاصة بك
    const owner = 'wgghkkikk';
    const repo = 'probable-guacamole';
    const workflowId = 'live.yml'; // اسم ملف الأكشن الذي سننشئه
    const token = 'ضع_هنا_الـ_TOKEN_الخاص_بك'; 

    async function toggleStream() {
        const btn = document.getElementById('streamBtn');
        const consoleLog = document.getElementById('console');
        const streamKey = document.getElementById('key').value;

        if (!streamKey) {
            alert("الرجاء إدخال مفتاح البث (Stream Key) أولاً!");
            return;
        }

        if (!isStreaming) {
            btn.innerText = "جاري الاتصال...";
            consoleLog.innerHTML += "<br>[SYSTEM]: جاري إرسال طلب التشغيل إلى GitHub Actions...";

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/${workflowId}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                    },
                    body: JSON.stringify({
                        ref: 'main', // اسم الفرع (Branch)
                        inputs: {
                            stream_key: streamKey
                        }
                    })
                });

                if (response.ok) {
                    btn.innerText = "إيقاف البث (Stop Stream)";
                    btn.classList.add('active');
                    consoleLog.innerHTML += "<br>[INFO]: تم تشغيل السيرفر بنجاح! البث سيظهر في يوتيوب خلال ثوانٍ.";
                    isStreaming = true;
                } else {
                    consoleLog.innerHTML += "<br>[ERROR]: فشل الاتصال. تأكد من الـ Token الخاص بك.";
                    btn.innerText = "بدء البث (Start Stream)";
                }
            } catch (error) {
                consoleLog.innerHTML += "<br>[ERROR]: خطأ في الشبكة.";
                btn.innerText = "بدء البث (Start Stream)";
            }
        } else {
            // هنا نحتاج كود آخر لإيقاف الـ Workflow إذا أردت
            btn.innerText = "بدء البث (Start Stream)";
            btn.classList.remove('active');
            consoleLog.innerHTML += "<br>[WARN]: تم طلب إيقاف البث.";
            isStreaming = false;
        }
    }
</script>
