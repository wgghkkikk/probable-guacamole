<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassan OBS Studio - PRO System</title>
    <style>
        :root { --bg: #121212; --panel: #282828; --border: #3c3c3c; --accent: #4a90e2; --green: #28a745; --red: #dc3545; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; font-size: 11px; }
        
        /* Layout */
        .preview { flex: 1.2; background: #000; margin: 5px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; position: relative; }
        .preview::before { content: "LIVE PREVIEW"; color: #222; font-size: 30px; font-weight: bold; }
        
        .dock-container { display: flex; background: var(--panel); border-top: 2px solid #000; height: 300px; padding: 5px; gap: 5px; overflow-x: auto; }
        .dock { border: 1px solid var(--border); background: #323232; display: flex; flex-direction: column; min-width: 150px; flex: 1; }
        .dock-header { background: #1e1e1e; padding: 4px; text-align: center; font-weight: bold; font-size: 10px; border-bottom: 1px solid var(--border); color: #aaa; }
        
        /* Inputs & Buttons */
        input { background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 5px; margin: 3px; border-radius: 2px; width: calc(100% - 10px); box-sizing: border-box; }
        button { background: #444; color: white; border: 1px solid #555; padding: 8px; margin: 3px; cursor: pointer; border-radius: 2px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-start { background: var(--green); font-weight: bold; }
        .btn-stop { background: var(--red); font-weight: bold; }
        
        /* Logic Indicators */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; display: inline-block; margin-left: 5px; }
        .active-dot { background: var(--red); box-shadow: 0 0 5px var(--red); }
        
        .console { background: #000; color: #0f0; font-family: monospace; font-size: 9px; padding: 5px; flex: 1; overflow-y: auto; border: 1px solid #222; margin: 3px; }
        .list-item { padding: 5px; border-bottom: 1px solid #3c3c3c; cursor: pointer; }
        .list-item:hover { background: #444; }
        .active-item { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="preview" id="screen">
    <div style="position:absolute; top:10px; left:10px; display:flex; align-items:center;">
        <div class="status-dot" id="recDot"></div> <span id="statusText">DROPPED</span>
    </div>
</div>

<div class="dock-container">
    <!-- Scenes -->
    <div class="dock">
        <div class="dock-header">Scenes</div>
        <div class="list-item active-item">YouTube_Live_24/7</div>
        <div class="list-item">Football_Match_View</div>
    </div>

    <!-- Sources -->
    <div class="dock">
        <div class="dock-header">Sources</div>
        <div class="list-item">🌐 YouTube Stream Source</div>
        <div class="list-item">🖼️ Aalloush_Kingdom_Logo</div>
        <div class="list-item">🔊 Desktop_Audio</div>
    </div>

    <!-- Settings (The Brain) -->
    <div class="dock" style="flex: 1.5;">
        <div class="dock-header">Stream Settings & Engine</div>
        <input type="text" id="v_url" placeholder="Video URL (رابط البث)">
        <input type="text" id="s_key" placeholder="Stream Key (مفتاح البث)">
        <input type="password" id="gh_token" placeholder="GitHub Access Token (ghp_...)">
        <div class="console" id="logBox">[SYSTEM]: Engine Initialized...</div>
    </div>

    <!-- Controls -->
    <div class="dock">
        <div class="dock-header">Controls</div>
        <button id="startBtn" class="btn-start" onclick="triggerAction('start')">Start Streaming</button>
        <button id="recordBtn" onclick="triggerAction('record')">Start Recording</button>
        <button onclick="location.reload()">Reset System</button>
        <button style="margin-top:auto" onclick="window.open('https://github.com/wgghkkikk/probable-guacamole/actions')">GitHub Actions Dashboard</button>
    </div>
</div>

<script>
    async function triggerAction(actionType) {
        const token = document.getElementById('gh_token').value;
        const url = document.getElementById('v_url').value;
        const key = document.getElementById('s_key').value;
        const log = document.getElementById('logBox');
        const startBtn = document.getElementById('startBtn');
        const recDot = document.getElementById('recDot');

        if (!token || !url || !key) {
            log.innerHTML += "<br>[ERROR]: Missing credentials! Check Token/Key.";
            return;
        }

        log.innerHTML += `<br>[INFO]: Sending ${actionType} command to GitHub...`;

        try {
            const response = await fetch('https://api.github.com/repos/wgghkkikk/probable-guacamole/actions/workflows/live.yml/dispatches', {
                method: 'POST',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: { stream_key: key, video_url: url }
                })
            });

            if (response.ok) {
                log.innerHTML += `<br>[SUCCESS]: GitHub Server started!`;
                startBtn.className = "btn-stop";
                startBtn.innerText = "Stop Streaming";
                recDot.classList.add('active-dot');
                document.getElementById('statusText').innerText = "LIVE (00:01)";
            } else {
                log.innerHTML += "<br>[ERROR]: Connection failed. Status: " + response.status;
            }
        } catch (err) {
            log.innerHTML += "<br>[CRITICAL]: Network Error: " + err.message;
        }
    }
</script>
</body>
</html>
