<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Hassan OBS Studio</title>
    <style>
        body { background: #1e1e1e; color: #fff; font-family: sans-serif; padding: 20px; }
        .panel { background: #2d2d2d; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; box-sizing: border-box; color: #000; }
        button { width: 100%; padding: 10px; background: #28a745; color: #fff; border: none; cursor: pointer; font-weight: bold; }
        .log { margin-top: 20px; background: #000; padding: 10px; color: #0f0; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="panel">
    <h3>إعدادات البث (Web-OBS)</h3>
    <input type="text" id="streamUrl" placeholder="رابط فيديو يوتيوب (URL)">
    <input type="text" id="streamKey" placeholder="مفتاح البث (Stream Key)">
    <input type="password" id="ghToken" placeholder="GitHub Personal Token">
    <button onclick="startStream()">بدء البث (START)</button>
    <div class="log" id="console">[SYSTEM]: جاهز...</div>
</div>

<script>
    async function startStream() {
        const token = document.getElementById('ghToken').value;
        const streamUrl = document.getElementById('streamUrl').value;
        const streamKey = document.getElementById('streamKey').value;
        const log = document.getElementById('console');

        if(!token || !streamKey || !streamUrl) { alert("يرجى ملء كافة الخانات!"); return; }

        log.innerHTML = "[INFO]: جاري الاتصال بـ GitHub...";

        const res = await fetch(`https://api.github.com/repos/wgghkkikk/probable-guacamole/actions/workflows/live.yml/dispatches`, {
            method: 'POST',
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({ ref: 'main', inputs: { stream_key: streamKey, video_url: streamUrl } })
        });

        if (res.ok) {
            log.innerHTML += "<br>[SUCCESS]: تم إرسال الأمر! راقب قناتك.";
        } else {
            log.innerHTML += "<br>[ERROR]: فشل الاتصال، تأكد من الـ Token والـ Workflow.";
        }
    }
</script>
</body>
</html>
