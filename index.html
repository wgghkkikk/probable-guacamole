<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassan OBS Studio - Ultimate</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #2d2d2d; --border: #000; --accent: #4a90e2; --text: #e0e0e0; --green: #28a745; --red: #dc3545; }
        body { background: #121212; color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-size: 10px; }
        
        /* Top Menu */
        nav { background: var(--panel); padding: 3px 10px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); }
        
        /* Main Workspace */
        .workspace { display: flex; flex: 1; flex-direction: column; overflow: hidden; }
        .preview-container { flex: 1.5; background: #000; margin: 5px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; position: relative; }
        .preview-container::after { content: "LIVE PREVIEW"; color: #222; font-size: 24px; font-weight: bold; }
        
        /* Bottom Docks */
        .docks { background: var(--panel); display: grid; grid-template-columns: 1fr 1fr 1.5fr 1fr 1fr; gap: 2px; padding: 5px; border-top: 2px solid var(--border); height: 280px; }
        .dock { background: #353535; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .dock-header { background: #1a1a1a; padding: 4px; text-align: center; font-weight: bold; color: #888; border-bottom: 1px solid var(--border); }
        
        /* Audio Mixer */
        .mixer-unit { padding: 5px; display: flex; flex-direction: column; gap: 5px; }
        .v-meter { height: 8px; background: linear-gradient(to right, green 60%, yellow 80%, red 100%); width: 100%; border-radius: 2px; }
        
        /* Inputs & Buttons */
        input { background: #111; border: 1px solid #444; color: #fff; padding: 4px; margin: 2px; width: calc(100% - 10px); font-size: 10px; }
        .obs-btn { background: #444; color: white; border: 1px solid #555; padding: 6px; margin: 2px; cursor: pointer; text-align: center; }
        .btn-stream { background: var(--green); font-weight: bold; margin-top: auto; }
        
        /* Stats Bar */
        .stats-bar { background: #000; padding: 2px 10px; display: flex; justify-content: space-between; font-size: 9px; color: #aaa; }
        .stat-item { display: flex; align-items: center; gap: 5px; }
        .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; }
        .active-live { background: var(--red); box-shadow: 0 0 5px var(--red); }
        
        .console { background: #000; color: #0f0; font-family: monospace; font-size: 9px; padding: 4px; flex: 1; overflow-y: auto; }
    </style>
</head>
<body>

<nav>
    <span>File</span><span>Edit</span><span>View</span><span>Profile</span><span>Scene Collection</span><span>Tools</span><span>Help</span>
</nav>

<div class="workspace">
    <div class="preview-container" id="mainScreen">
        <div style="position:absolute; top:5px; right:10px; color:white;" id="timer">00:00:00</div>
    </div>

    <div class="docks">
        <!-- Scenes -->
        <div class="dock">
            <div class="dock-header">Scenes</div>
            <div style="background:var(--accent); padding:4px;">Main_Broadcast</div>
            <div style="padding:4px;">Break_Screen</div>
        </div>

        <!-- Sources -->
        <div class="dock">
            <div class="dock-header">Sources</div>
            <div style="padding:4px;">🌐 Media_Source</div>
            <div style="padding:4px;">🖼️ Logo_Overlay</div>
            <div style="padding:4px;">🔊 Mic_Input</div>
        </div>

        <!-- Audio Mixer -->
        <div class="dock">
            <div class="dock-header">Audio Mixer</div>
            <div class="mixer-unit">
                <span>Desktop Audio</span>
                <div class="v-meter"></div>
                <span>Mic/Aux</span>
                <div class="v-meter"></div>
            </div>
        </div>

        <!-- Settings -->
        <div class="dock">
            <div class="dock-header">Stream Settings</div>
            <input type="text" id="url" placeholder="Video URL">
            <input type="text" id="key" placeholder="Stream Key">
            <input type="password" id="token" placeholder="GitHub Token">
            <div class="console" id="logBox">> System Ready.</div>
        </div>

        <!-- Controls -->
        <div class="dock">
            <div class="dock-header">Controls</div>
            <button class="obs-btn btn-stream" id="startBtn" onclick="runOBS()">Start Streaming</button>
            <button class="obs-btn">Start Recording</button>
            <button class="obs-btn">Studio Mode</button>
            <button class="obs-btn" onclick="location.reload()">Settings</button>
            <button class="obs-btn">Exit</button>
        </div>
    </div>
</div>

<div class="stats-bar">
    <div class="stat-item"><div class="live-dot" id="dot"></div> LIVE: <span id="liveTime">00:00</span></div>
    <div class="stat-item">REC: 00:00</div>
    <div class="stat-item">CPU: 2.4%</div>
    <div class="stat-item">FPS: 30.00</div>
    <div class="stat-item">Bitrate: 2500 kb/s</div>
</div>

<script>
    async function runOBS() {
        const token = document.getElementById('token').value;
        const url = document.getElementById('url').value;
        const key = document.getElementById('key').value;
        const log = document.getElementById('logBox');
        const startBtn = document.getElementById('startBtn');
        const dot = document.getElementById('dot');

        if(!token || !url || !key) { alert("أكمل البيانات يا حسن!"); return; }

        log.innerHTML += "<br>> Connecting to Cloud Engine...";
        
        try {
            const res = await fetch('https://api.github.com/repos/wgghkkikk/probable-guacamole/actions/workflows/live.yml/dispatches', {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ ref: 'main', inputs: { stream_key: key, video_url: url } })
            });

            if(res.ok) {
                log.innerHTML += "<br>> [SUCCESS] Stream Started!";
                startBtn.innerText = "Stop Streaming";
                startBtn.style.background = "var(--red)";
                dot.classList.add('active-live');
            } else {
                log.innerHTML += "<br>> [ERROR] Connection Failed.";
            }
        } catch(e) {
            log.innerHTML += "<br>> [CRITICAL] Network Error.";
        }
    }
</script>
</body>
</html>
