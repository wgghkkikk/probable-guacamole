<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hassan Engine v1.0</title>
    <style>
        :root { --main-bg: #0f0f0f; --panel-bg: #1a1a1a; --accent: #3b82f6; --text: #e5e7eb; }
        body { background: var(--main-bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* شاشة المعاينة الذكية */
        .preview-screen { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; }
        #main-video { width: 100%; height: 100%; object-fit: contain; }
        .canvas-overlay { position: absolute; inset: 0; pointer-events: none; }
        #text-layer { position: absolute; bottom: 15%; width: 100%; text-align: center; font-size: 20px; font-weight: bold; color: white; text-shadow: 2px 2px 5px #000; }
        #logo-layer { position: absolute; top: 15px; right: 15px; width: 60px; height: 60px; object-fit: contain; opacity: 0.8; }

        /* منطقة التحكم (Docks) */
        .controls-area { height: 55%; background: var(--panel-bg); display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px; overflow-y: auto; }
        .dock { background: #262626; border: 1px solid #333; padding: 10px; border-radius: 4px; }
        h4 { margin: 0 0 10px 0; font-size: 10px; color: #888; text-transform: uppercase; border-bottom: 1px solid #333; }

        input, select { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 8px; margin-bottom: 8px; border-radius: 4px; font-size: 12px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-start { background: #22c55e; color: white; }
        .btn-stop { background: #ef4444; color: white; }
        
        footer { background: #000; padding: 5px 10px; font-size: 9px; color: #666; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="preview-screen">
    <video id="main-video" autoplay muted loop poster="https://via.placeholder.com/1280x720/000/000"></video>
    <div class="canvas-overlay">
        <img id="logo-layer" src="" style="display:none;">
        <div id="text-layer"></div>
    </div>
</div>

<div class="controls-area">
    <!-- مصادر البث -->
    <div class="dock">
        <h4>Sources & Layers</h4>
        <input type="text" id="v_url" placeholder="رابط الفيديو (Direct Link)" oninput="updatePreview()">
        <input type="text" id="l_url" placeholder="رابط اللوغو (PNG)" oninput="updateLayers()">
        <input type="text" id="o_text" placeholder="نص البث (Kingdom)" oninput="updateLayers()">
    </div>

    <!-- الإعدادات والفلاتر -->
    <div class="dock">
        <h4>Engine Settings</h4>
        <select id="v_filter" onchange="updateLayers()">
            <option value="none">Normal Filter</option>
            <option value="grayscale(100%)">Black & White</option>
            <option value="brightness(1.4) contrast(1.2)">Action Mode</option>
            <option value="sepia(0.5)">Classic</option>
        </select>
        <select id="v_res">
            <option value="720">720p (HD)</option>
            <option value="1080">1080p (FHD)</option>
        </select>
        <input type="password" id="g_token" placeholder="GitHub Token">
    </div>

    <!-- أزرار البث -->
    <div class="dock" style="grid-column: span 2;">
        <h4>Master Controls</h4>
        <div style="display: flex; gap: 5px;">
            <button class="btn btn-start" onclick="launchStream()">GO LIVE NOW</button>
            <button class="btn btn-stop" onclick="location.reload()">REBOOT ENGINE</button>
        </div>
        <div id="status-log" style="font-family:monospace; font-size:10px; color: #0f0; margin-top:5px;">> Engine Ready...</div>
    </div>
</div>

<footer>
    <span>Hassan Kingdom Stream Engine v1.0</span>
    <span>CPU: 0.8% | STATUS: READY</span>
</footer>

<script>
    function updatePreview() {
        const url = document.getElementById('v_url').value;
        const video = document.getElementById('main-video');
        if(url.startsWith('http')) {
            video.src = url;
            document.getElementById('status-log').innerText = "> Video Source Connected.";
        }
    }

    function updateLayers() {
        const text = document.getElementById('o_text').value;
        const logo = document.getElementById('l_url').value;
        const filter = document.getElementById('v_filter').value;

        document.getElementById('text-layer').innerText = text;
        
        const logoEl = document.getElementById('logo-layer');
        if(logo) { logoEl.src = logo; logoEl.style.display = 'block'; }
        
        document.getElementById('main-video').style.filter = filter;
    }

    async function launchStream() {
        const token = document.getElementById('g_token').value;
        const log = document.getElementById('status-log');
        
        if(!token) { alert("أدخل الـ Token يا بطل!"); return; }

        log.innerText = "> Sending Instructions to GitHub...";
        
        // كود الربط الفعلي مع سيرفر GitHub
        try {
            const res = await fetch('https://api.github.com/repos/wgghkkikk/probable-guacamole/actions/workflows/live.yml/dispatches', {
                method: 'POST',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: {
                        video_url: document.getElementById('v_url').value,
                        stream_key: "Q12g-s6wc-0y03-0ua5-6e6p", // مفتاحك المحفوظ
                        filter_type: document.getElementById('v_filter').value
                    }
                })
            });
            if(res.ok) log.innerText = "> [SUCCESS] BROADCAST ACTIVE!";
            else log.innerText = "> [ERROR] AUTH FAILED.";
        } catch(e) { log.innerText = "> [FAILED] CONNECTION ERROR."; }
    }
</script>
</body>
</html>
