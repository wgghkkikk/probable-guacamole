<script>
    async function startBroadcasting() {
        const btn = document.getElementById('streamBtn');
        const log = document.getElementById('console');

        // سيطلب منك الكود إدخال الـ Token مرة واحدة لكي لا يكتشفه نظام الحماية
        const GITHUB_TOKEN = prompt("يرجى لصق الـ Token السري (ghp_...) هنا:");
        const STREAM_KEY = "q12g-s6wc-0y03-0ua5-6e6p";
        const USER = "wgghkkikk";
        const REPO = "probable-guacamole";

        if (!GITHUB_TOKEN) return;

        btn.innerText = "جاري الاتصال...";
        log.innerHTML += "<br>[INFO]: جاري المحاولة باستخدام المفتاح الجديد...";

        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/actions/workflows/live.yml/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({ ref: 'main', inputs: { stream_key: STREAM_KEY } })
            });

            if (res.ok) {
                btn.innerText = "البث يعمل!";
                btn.classList.add('active');
                log.innerHTML += "<br>[SUCCESS]: تم التشغيل! اذهب ليوتيوب.";
            } else {
                log.innerHTML += "<br>[ERROR]: الـ Token غير صحيح أو صلاحياته منتهية.";
                btn.innerText = "بدء البث (START STREAM)";
            }
        } catch (e) {
            log.innerHTML += "<br>[ERROR]: خطأ في الشبكة.";
        }
    }
</script>
