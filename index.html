<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassan OBS Studio</title>
    <style>
        :root { --bg: #121212; --panel: #2d2d2d; --text: #e0e0e0; --green: #28a745; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--panel); padding: 8px; font-size: 12px; border-bottom: 1px solid #000; color: #888; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: var(--panel); padding: 15px; border-left: 1px solid #000; }
        .preview { flex: 1; background: #000; margin: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid #333; }
        .obs-btn { background: #444; color: white; border: 1px solid #555; padding: 12px; width: 100%; margin-bottom: 8px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-live { background: var(--green); font-weight: bold; }
        .btn-live.active { background: #dc3545; animation: blink 1s infinite; }
        input { width: 90%; background: #111; border: 1px solid #444; color: #fff; padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .bottom { height: 140px; background: var(--panel); border-top: 1px solid #000; display: flex; padding: 10px; gap: 10px; }
        .logs { flex: 1; background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; border: 1px solid #333; }
        @keyframes blink { 50% { opacity: 0.6; } }
    </style>
</head>
<body>

<header>File &nbsp; Edit &nbsp; View &nbsp; Profile &nbsp; Help</header>

<div class="main">
    <div class="preview">
        <div style="color: #444;">[ شاشة المعاينة ]</div>
    </div>

    <div class="sidebar">
        <div style="font-size: 11px; color: #aaa; margin-bottom: 10px;">التحكم بالبث</div>
        <button class="obs-btn btn-live" id="streamBtn" onclick="runAction()">بدء البث (START)</button>
        <button class="obs-btn" onclick="location.reload()">تحديث الواجهة</button>
        
        <div style="margin-top: 20px; font-size: 11px; color: #aaa; margin-bottom: 10px;">إعدادات القناة</div>
        <input type="password" id="sKey" placeholder="ضع مفتاح البث هنا...">
    </div>
</div>

<div class="bottom">
    <div class="logs" id="console">> نظام OBS جاهز... بانتظار المفتاح.</div>
</div>

<script>
    async function runAction() {
        const btn = document.getElementById('streamBtn');
        const log = document.getElementById('console');
        const key = document.getElementById('sKey').value;

        if(!key) { alert("يرجى إدخال مفتاح البث!"); return; }

        btn.innerText = "جاري التشغيل...";
        log.innerHTML += "<br>[INFO]: جاري إرسال الأمر لسيرفرات GitHub...";

        // ملاحظة: تأكد من وضع الـ Token الخاص بك هنا لكي يختفي البياض وتعمل الأزرار
        const myToken = "ضع_الـ_TOKEN_هنا";

        try {
            const res = await fetch('https://api.github.com/repos/wgghkkikk/probable-guacamole/actions/workflows/live.yml/dispatches', {
                method: 'POST',
                headers: {
                    'Authorization': `token ${myToken}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({ ref: 'main', inputs: { stream_key: key } })
            });

            if(res.ok) {
                btn.innerText = "إيقاف البث";
                btn.classList.add('active');
                log.innerHTML += "<br>[SUCCESS]: تم تشغيل البث بنجاح!";
            } else {
                log.innerHTML += "<br>[ERROR]: فشل الاتصال. تأكد من الـ Token.";
                btn.innerText = "بدء البث (START)";
            }
        } catch(e) {
            log.innerHTML += "<br>[ERROR]: خطأ في الشبكة.";
        }
    }
</script>

</body>
</html>
