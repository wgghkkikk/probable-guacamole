<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-OBS Studio</title>
    <style>
        :root { --bg-dark: #1e1e1e; --panel-bg: #2d2d2d; --accent: #4a90e2; --text: #e0e0e0; }
        body { background: #121212; color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--panel-bg); padding: 5px 15px; font-size: 13px; border-bottom: 1px solid #000; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .preview-area { flex: 3; background: #000; display: flex; align-items: center; justify-content: center; position: relative; border: 2px solid #333; margin: 10px; }
        .preview-area::after { content: "شاشة المعاينة (LIVE PREVIEW)"; color: #333; font-weight: bold; }
        .sidebar { flex: 1; background: var(--panel-bg); display: flex; flex-direction: column; border-right: 1px solid #000; padding: 10px; min-width: 250px; }
        .panel-title { font-size: 12px; font-weight: bold; margin-bottom: 10px; color: #aaa; text-transform: uppercase; border-bottom: 1px solid #444; }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; margin-bottom: 5px; }
        input { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 8px; font-size: 12px; border-radius: 3px; }
        .obs-btn { background: #444; color: white; border: 1px solid #555; padding: 10px; width: 100%; margin-bottom: 5px; cursor: pointer; text-align: center; border-radius: 3px; }
        .obs-btn:hover { background: #555; }
        .btn-stream { background: #28a745; border-color: #1e7e34; font-weight: bold; }
        .btn-stream.active { background: #dc3545; animation: blink 1s infinite; }
        .bottom-bar { height: 150px; background: var(--panel-bg); border-top: 1px solid #000; display: flex; padding: 10px; gap: 10px; }
        .mixer { flex: 1; border: 1px solid #444; padding: 5px; }
        .logs { flex: 2; background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 5px; overflow-y: auto; }
        @keyframes blink { 50% { opacity: 0.6; } }
    </style>
</head>
<body>

<header>File &nbsp; Edit &nbsp; View &nbsp; Scene &nbsp; Help</header>

<div class="main-layout">
    <div class="sidebar">
        <div class="panel-title">التحكم بالبث (Controls)</div>
        <div class="control-group">
            <button class="obs-btn btn-stream" id="streamBtn" onclick="toggleStream()">بدء البث (Start Stream)</button>
            <button class="obs-btn" onclick="location.reload()">تحديث النظام</button>
        </div>

        <div class="panel-title">إعدادات القناة</div>
        <div class="control-group">
            <label>مفتاح البث (Stream Key):</label>
            <input type="password" id="keyInput" placeholder="Pasted from YouTube...">
        </div>
    </div>

    <div class="preview-area" id="preview"></div>
</div>

<div class="bottom-bar">
    <div class="mixer">
        <div class="panel-title">ميكسر الصوت (Audio)</div>
        <div style="height:10px; background: linear-gradient(to right, green, yellow, red); width: 80%; margin-bottom:5px;"></div>
        <span style="font-size: 10px;">Mic/Aux: [||||||||||||||---]</span>
    </div>
    <div class="logs" id="console">
        [SYSTEM]: نظام Web-OBS جاهز...<br>
        [SYSTEM]: بانتظار إدخال مفتاح البث للبدء.
    </div>
</div>

<script>
    let isStreaming = false;
    
    async function toggleStream() {
        const btn = document.getElementById('streamBtn');
        const consoleLog = document.getElementById('console');
        const streamKey = document.getElementById('keyInput').value;
        
        // معلومات حسابك
        const GITHUB_TOKEN = "ضع_الـ_TOKEN_هنا"; 
        const USER = "wgghkkikk";
        const REPO = "probable-guacamole";

        if (!streamKey) {
            alert("يرجى وضع مفتاح البث أولاً!");
            return;
        }

        if (!isStreaming) {
            btn.innerText = "جاري طلب البث...";
            consoleLog.innerHTML += "<br>[INFO]: جاري إرسال الإشارة للسيرفر...";

            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/actions/workflows/live.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                    },
                    body: JSON.stringify({ ref: 'main', inputs: { stream_key: streamKey } })
                });

                if (response.ok) {
                    btn.innerText = "إيقاف البث (Stop Stream)";
                    btn.classList.add('active');
                    consoleLog.innerHTML += "<br>[SUCCESS]: البث بدأ بنجاح! تفقد يوتيوب.";
                    isStreaming = true;
                } else {
                    consoleLog.innerHTML += "<br>[ERROR]: فشل التشغيل، تأكد من الـ Token.";
                    btn.innerText = "بدء البث (Start Stream)";
                }
            } catch (e) {
                consoleLog.innerHTML += "<br>[ERROR]: خطأ في الاتصال بالإنترنت.";
                btn.innerText = "بدء البث (Start Stream)";
            }
        } else {
            btn.innerText = "بدء البث (Start Stream)";
            btn.classList.remove('active');
            consoleLog.innerHTML += "<br>[WARN]: تم طلب إيقاف البث.";
            isStreaming = false;
        }
    }
</script>

</body>
</html>
