<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hassan Kingdom OBS</title>
    <style>
        :root {
            --obs-bg: #1e1e1e;
            --obs-panel: #2d2d2d;
            --obs-accent: #4a90e2;
            --obs-border: #111;
        }

        body {
            background: #000;
            color: #ccc;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-size: 10px;
        }

        /* شريط القوائم العلوي */
        header { background: var(--obs-panel); padding: 5px; display: flex; gap: 10px; border-bottom: 1px solid #000; }

        /* منطقة العمل المركزية */
        .main-canvas {
            flex: 1;
            display: flex;
            background: #121212;
            padding: 10px;
            gap: 10px;
        }

        /* شاشة العرض (Preview) */
        .preview-box {
            flex: 2;
            background: #000;
            border: 2px solid #333;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #video_preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* الطبقات الفوقية (Overlay) */
        .overlay-label {
            position: absolute;
            color: rgba(255,255,255,0.5);
            border: 1px dashed #444;
            padding: 5px;
            pointer-events: none;
        }

        /* لوحة الخصائص (Properties) */
        .properties-panel {
            flex: 1;
            background: var(--obs-panel);
            border: 1px solid var(--obs-border);
            display: flex;
            flex-direction: column;
        }

        .panel-header { background: #1a1a1a; padding: 5px; font-weight: bold; font-size: 9px; }
        .panel-body { padding: 10px; flex: 1; overflow-y: auto; }

        /* تقسيم الـ Docks السفلي */
        .docks-area {
            height: 200px;
            background: var(--obs-panel);
            border-top: 2px solid #000;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1.5fr 1fr;
            gap: 2px;
            padding: 2px;
        }

        .dock { background: #353535; border: 1px solid #111; display: flex; flex-direction: column; }
        .dock-title { background: #1a1a1a; padding: 4px; text-align: center; font-size: 8px; color: #888; }

        /* الأزرار والمدخلات */
        .control-group { margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        label { display: block; margin-bottom: 3px; color: var(--obs-accent); font-weight: bold; }
        input, select { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 4px; font-size: 9px; margin-bottom: 5px; }
        
        .btn { width: 100%; padding: 8px; margin-bottom: 3px; border: 1px solid #555; background: #4a4a4a; color: white; cursor: pointer; }
        .btn-live { background: #dc3545; font-weight: bold; border: none; }
        
        .active-item { background: var(--obs-accent) !important; }
    </style>
</head>
<body>

<header>
    <span>File</span><span>Edit</span><span>View</span><span>Source</span><span>Tools</span>
</header>

<div class="main-canvas">
    <!-- المعاينة الحية -->
    <div class="preview-box">
        <video id="video_preview" autoplay muted loop poster="https://via.placeholder.com/1280x720/000/fff?text=AALLOUSH+KINGDOM+ENGINE"></video>
        <div class="overlay-label" style="top:10%; right:5%;" id="logo_preview">LOGO</div>
        <div class="overlay-label" style="bottom:10%; left:50%; transform:translateX(-50%);" id="text_preview">TEXT OVERLAY</div>
    </div>

    <!-- لوحة الخصائص والمرشحات (Filters) -->
    <div class="properties-panel">
        <div class="panel-header">Properties: Media Source</div>
        <div class="panel-body">
            <div class="control-group">
                <label>Video Filter</label>
                <select onchange="applyFilter(this.value)">
                    <option value="none">None (Default)</option>
                    <option value="grayscale(100%)">Black & White</option>
                    <option value="brightness(1.5)">High Brightness</option>
                    <option value="contrast(1.5)">High Contrast</option>
                    <option value="sepia(1)">Old Style</option>
                </select>
            </div>
            <div class="control-group">
                <label>Overlay Logo (URL)</label>
                <input type="text" id="logo_url" placeholder="https://..." oninput="updateLogo(this.value)">
            </div>
            <div class="control-group">
                <label>Scroll Text</label>
                <input type="text" id="scroll_text" placeholder="Write something..." oninput="updateText(this.value)">
            </div>
        </div>
    </div>
</div>

<div class="docks-area">
    <div class="dock"><div class="dock-title">Scenes</div><div class="dock-body"><button class="btn active-item">Main Stream</button><button class="btn">Match Mode</button></div></div>
    <div class="dock"><div class="dock-title">Sources</div><div class="dock-body"><button class="btn">🌐 Browser</button><button class="btn">🖼️ Logo</button><button class="btn">📝 Text</button></div></div>
    <div class="dock"><div class="dock-title">Audio</div><div class="dock-body">
        <div style="height:10px; background:#000; margin-bottom:5px;"><div style="width:70%; height:100%; background:green;"></div></div>
        <div style="height:10px; background:#000;"><div style="width:10%; height:100%; background:green;"></div></div>
    </div></div>
    <div class="dock">
        <div class="dock-title">Stream Engine</div>
        <div class="dock-body" style="padding:5px;">
            <input type="text" id="v_url" placeholder="Paste Video URL Here">
            <input type="text" id="s_key" placeholder="Stream Key">
            <button class="btn btn-live" onclick="startEngine()">START LIVE</button>
        </div>
    </div>
    <div class="dock"><div class="dock-title">Status</div><div class="dock-body" id="log" style="font-family:monospace; font-size:8px; color:yellow;">> Waiting for input...</div></div>
</div>

<script>
    // تحديث المعاينة الحية قبل البث
    function startEngine() {
        const url = document.getElementById('v_url').value;
        const video = document.getElementById('video_preview');
        const log = document.getElementById('log');
        
        if(url) {
            video.src = url; // محاولة تشغيل الفيديو في المعاينة
            log.innerHTML += "<br>> Initializing Preview...";
            log.innerHTML += "<br>> Syncing with GitHub...";
            // هنا يرسل الأمر لـ GitHub لبدء البث الفعلي
        } else {
            alert("حط الرابط أولاً يا حسن!");
        }
    }

    function updateLogo(url) {
        const lp = document.getElementById('logo_preview');
        lp.innerHTML = `<img src="${url}" style="max-width:50px; opacity:0.7;">`;
    }

    function updateText(val) {
        document.getElementById('text_preview').innerText = val;
    }

    function applyFilter(f) {
        document.getElementById('video_preview').style.filter = f;
    }
</script>
</body>
</html>
