name: Kingdom Live Engine
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'رابط الفيديو'
        required: true
      overlay_text:
        description: 'النص'
        required: false

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg
      - name: Launch Stream
        run: |
          ffmpeg -re -i "${{ github.event.inputs.video_url }}" \
          -vf "drawtext=text='${{ github.event.inputs.overlay_text }}':x=(w-text_w)/2:y=h-th-20:fontsize=30:fontcolor=white" \
          -c:v libx264 -preset veryfast -b:v 3000k \
          -c:a aac -b:a 128k -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}"
